<div class="min-h-screen bg-slate-900 text-white flex flex-col items-center font-sans" [ngClass]="{'justify-center': !isLoggedIn, 'pt-12': isLoggedIn}">
  
  <div class="text-center mb-8">
    <h1 class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 mb-4">
      TinyMetrics 🚀
    </h1>
    <p class="text-gray-400">Mein URL-Shortener</p>
  </div>

  <div *ngIf="!isLoggedIn" class="bg-gray-800 p-8 rounded-2xl shadow-xl text-center max-w-md w-full space-y-6">
    <h2 class="text-2xl font-semibold mb-6">Willkommen zurück</h2>

    <!-- Login mit E-Mail/Passwort -->
    <form (ngSubmit)="loginWithPassword()" class="space-y-4 text-left">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-1">E-Mail</label>
        <input id="email" type="email" [(ngModel)]="email" name="email"
          class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
          placeholder="deine@email.de" required />
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Passwort</label>
        <input id="password" type="password" [(ngModel)]="password" name="password"
          class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
          placeholder="••••••••" required />
      </div>
      <button type="submit"
        class="w-full bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-lg font-bold transition duration-200">
        Einloggen
      </button>
    </form>

    <div class="relative my-6">
      <span class="block text-gray-500 text-sm">oder</span>
    </div>

    <button (click)="login()"
      class="w-full flex items-center justify-center gap-3 bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-lg font-bold transition duration-200">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
      </svg>
      Login mit GitHub
    </button>

    <!-- Signup-Formular -->
    <div class="pt-6 border-t border-gray-600">
      <h3 class="text-lg font-semibold mb-4">Noch kein Konto?</h3>
      <form (ngSubmit)="signup()" class="space-y-4 text-left">
        <div>
          <label for="signupEmail" class="block text-sm font-medium text-gray-300 mb-1">E-Mail</label>
          <input id="signupEmail" type="email" [(ngModel)]="signupEmail" name="signupEmail"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="deine@email.de" required />
        </div>
        <div>
          <label for="signupPassword" class="block text-sm font-medium text-gray-300 mb-1">Passwort</label>
          <input id="signupPassword" type="password" [(ngModel)]="signupPassword" name="signupPassword"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="••••••••" required />
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-lg font-bold transition duration-200">
          Registrieren
        </button>
      </form>
    </div>
  </div>

  <div *ngIf="isLoggedIn" class="w-full max-w-4xl p-4">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-3xl font-bold text-white">Dein Dashboard</h2>
      <button (click)="logout()" class="text-gray-400 hover:text-red-400 transition text-sm font-semibold">
        Ausloggen &rarr;
      </button>
    </div>
    <div class="bg-gray-800 p-6 rounded-2xl shadow-xl mb-10 border border-gray-700">
      <label class="block text-gray-400 text-sm font-bold mb-2">Neue URL kürzen</label>
      <div class="flex gap-4">
        <input type="text" [(ngModel)]="newUrl" placeholder="https://google.de" 
               class="flex-1 bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none transition">
        <button (click)="shortenUrl()" 
                class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-8 py-3 rounded-lg transition shadow-lg shadow-emerald-500/20">
          Kürzen
        </button>
      </div>
    </div>
    <div class="space-y-4">
      <h3 class="text-xl font-semibold text-gray-300 mb-4">Deine Links</h3>
      <div *ngIf="urls.length === 0" class="text-center text-gray-500 py-10">
        Noch keine Links vorhanden. Erstelle deinen ersten!
      </div>
      <div *ngFor="let url of urls" class="bg-gray-800 p-5 rounded-xl border border-gray-700 hover:border-emerald-500/50 transition flex justify-between items-center">
        <div class="overflow-hidden">
          <div class="flex items-center gap-3 mb-1">
            <a [href]="'http://tinymetrics.duckdns.org:8000/' + url.short_code" target="_blank" 
               class="text-xl font-bold text-emerald-400 hover:underline">
              tinymetrics.duckdns.org:8000/{{ url.short_code }}
            </a>
            <span class="text-xs bg-gray-700 text-gray-300 px-2 py-1 rounded">
              {{ url.click_count }} Klicks
            </span>
          </div>
          <p class="text-gray-500 text-sm truncate max-w-md">{{ url.original_url }}</p>
        </div>
        <div>
          <button (click)="copyToClipboard(url.short_code)" class="text-gray-400 hover:text-white p-2" title="Kopieren">
            📋
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
